services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - ./server/.env
    environment:
      - CLIENT_URL=http://localhost:8080
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
